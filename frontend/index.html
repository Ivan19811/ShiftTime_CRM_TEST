<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShiftTime CRM TEST</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <h1>ShiftTime CRM</h1>
    <div id="version">Версія: <span id="versionValue">...</span></div>
    <button id="refreshBtn" disabled>🔁 Оновити</button>
  </header>

  <main>
  <section style="display: flex; align-items: center; gap: 2rem;">
    <div>
      <input type="number" id="inputValue" placeholder="Введіть число" />
      <button id="sendBtn">Надіслати</button>
      <p id="status"></p>
    </div>
    <div>
      <label>Останнє число:</label>
      <input type="text" id="lastValue" readonly style="font-weight: bold;" />
    </div>
  </section>
</main>

  <script src="script.js"></script>
</body>
</html>
